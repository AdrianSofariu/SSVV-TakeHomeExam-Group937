<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Automated Restock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; }
        .btn-custom { border-radius: 20px; transition: all 0.3s ease; }
        .btn-custom:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Inventory System</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/suppliers">Suppliers</a></li>
                <li class="nav-item"><a class="nav-link" href="/shipments">Shipments</a></li>
                <li class="nav-item"><a class="nav-link active text-warning" href="/restock">Restock</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/report">Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">Automated Restock System</h2>

                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" id="error-msg">
                    <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
                </div>
                <div th:if="${successMessage}" class="alert alert-success" role="alert" id="success-msg">
                    <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
                </div>

                <form action="/restock" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">1. Select Product:</label>
                        <select name="productId" class="form-select" id="product-select" required>
                            <option value="" disabled selected>Choose a product...</option>
                            <option th:each="p : ${products}" th:value="${p.id}"
                                    th:text="${p.name + ' (Current Stock: ' + p.stockLevel + ' | Max: ' + p.maxCapacity + ')'}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">2. Select Supplier:</label>
                        <select name="supplierId" class="form-select" id="supplier-select" required>
                            <option value="" disabled selected>Choose a supplier...</option>
                            <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">3. Order Quantity:</label>
                        <input type="number" class="form-control" name="quantity" id="quantity-input" placeholder="Enter amount to restock" required>
                    </div>

                    <button type="submit" class="btn btn-warning btn-custom w-100 fw-bold fs-5 shadow-sm" id="submit-btn">
                        Generate Shipment Record
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
