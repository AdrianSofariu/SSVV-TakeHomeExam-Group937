<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; }
        .table th { background-color: #343a40; color: white; }
        .btn-custom { border-radius: 20px; transition: all 0.3s ease; }
        .btn-custom:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Inventory System</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/suppliers">Suppliers</a></li>
                <li class="nav-item"><a class="nav-link" href="/shipments">Shipments</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="/restock">Restock</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/report">Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h4 class="mb-3" th:text="${newProduct.id != null} ? 'Edit Product' : 'Add New Product'">Add Product</h4>
                <form th:action="@{/products/save}" th:object="${newProduct}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Initial Stock</label>
                        <input type="number" class="form-control" th:field="*{stockLevel}" min="0" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stockLevel')}" th:errors="*{stockLevel}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Min Threshold</label>
                        <input type="number" class="form-control" th:field="*{minThreshold}" min="0" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('minThreshold')}" th:errors="*{minThreshold}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Max Capacity</label>
                        <input type="number" class="form-control" th:field="*{maxCapacity}" min="1" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-custom w-100" th:text="${newProduct.id != null} ? 'Update Product' : 'Save Product'"></button>
                    <a th:if="${newProduct.id != null}" href="/products" class="btn btn-outline-secondary btn-custom w-100 mt-2">Cancel Edit</a>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Product List</h4>
                    <input type="text" id="searchInput" class="form-control w-50" placeholder="Search products...">
                </div>

                <table class="table table-hover mt-3" id="dataTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Stock</th>
                        <th>Threshold</th>
                        <th>Capacity</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td>
                            <span th:class="${product.stockLevel < product.minThreshold ? 'badge bg-danger' : 'badge bg-success'}"
                                  th:text="${product.stockLevel}"></span>
                        </td>
                        <td th:text="${product.minThreshold}"></td>
                        <td th:text="${product.maxCapacity}"></td>
                        <td>
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-warning btn-custom">Edit</a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                               class="btn btn-sm btn-danger btn-custom"
                               onclick="return confirmDelete()">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmDelete() {
        return confirm("Are you sure you want to delete this item? Any shipments tied to it will also be deleted.");
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#dataTable tbody tr');

        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            if(text.includes(filter)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
