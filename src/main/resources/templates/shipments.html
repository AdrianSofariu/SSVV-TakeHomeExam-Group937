<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Shipments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; }
        .table th { background-color: #343a40; color: white; }
        .btn-custom { border-radius: 20px; transition: all 0.3s ease; }
        .btn-custom:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Inventory System</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/suppliers">Suppliers</a></li>
                <li class="nav-item"><a class="nav-link active" href="/shipments">Shipments</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="/restock">Restock</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/report">Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Shipment History</h4>
                    <input type="text" id="searchInput" class="form-control w-25" placeholder="Search shipments...">
                </div>

                <div class="alert alert-info">
                    <strong>Note:</strong> Shipments are generated automatically via the <a href="/restock" class="alert-link">Automated Restock</a> system.
                </div>

                <table class="table table-hover mt-3" id="dataTable">
                    <thead>
                    <tr>
                        <th>Shipment ID</th>
                        <th>Date</th>
                        <th>Product</th>
                        <th>Supplier</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="shipment : ${shipments}">
                        <td th:text="'SHP-' + ${shipment.id}"></td>
                        <td th:text="${shipment.shipmentDate}"></td>
                        <td th:text="${shipment.product.name}"></td>
                        <td th:text="${shipment.supplier.name}"></td>
                        <td><span class="badge bg-success" th:text="'+' + ${shipment.quantity}"></span></td>
                        <td>
                            <a th:href="@{/shipments/delete/{id}(id=${shipment.id})}"
                               class="btn btn-sm btn-danger btn-custom"
                               onclick="return confirmDelete()">Delete Record</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(shipments)}">
                        <td colspan="6" class="text-center text-muted">No shipments generated yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmDelete() {
        return confirm("Delete this shipment record? (Note: This does not reverse the stock addition).");
    }

    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#dataTable tbody tr');

        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            if(text.includes(filter)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
